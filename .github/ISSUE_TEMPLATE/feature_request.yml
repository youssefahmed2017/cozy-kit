name: Feature Request
description: Suggest an idea for cozy-kit
labels: ["enhancement", "needs-discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest something! cozy-kit stays small by design, so not every idea fits — but every suggestion gets read.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that cozy-kit doesn't help with today?
      placeholder: "I keep writing the same boilerplate to..."
    validations:
      required: true

  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround
      description: How do you handle this today without the feature?
      placeholder: "Right now I..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: What would you like to see?
      description: Your idea. Doesn't have to be fully formed.
      placeholder: "It would be nice if..."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Quick checks
      options:
        - label: This fits the "cozy utilities for everyday scripts" vibe (not a web framework, database, etc.)
          required: false
        - label: I've checked that this isn't already possible with existing cozy-kit features
          required: false
        - label: I'd be open to trying a pull request for this
          required: false
